<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <!--
    ════════════════════════════════════════════════════════════════
    🤫 Подсказка для тех, кто ищет секретный код:

      Я. Люблю. Свою. Школу.
      I . Love . My . School.

      Дальше — догадайся сам(а). Введи догадку в последней вкладке.
    ════════════════════════════════════════════════════════════════
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#161b3a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2ff" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="light dark" />
  <title>Banana — помощник</title>
  <meta name="copyright" content="© banana.team" />
  <meta name="author" content="banana.team" />
  <meta name="application-name" content="Banana" />
  <meta name="description" content="Banana — набор удобных инструментов: счётчик и преобразование текста, шрифты для Word, Unicode-стили для Telegram и Discord." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Banana" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='64' y2='64' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23222949'/><stop offset='1' stop-color='%231c1f3a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><text x='32' y='32' font-family='Arial, sans-serif' font-size='38' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>B</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='180' y2='180' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23222949'/><stop offset='1' stop-color='%231c1f3a'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><text x='90' y='90' font-family='Arial, sans-serif' font-size='108' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>B</text></svg>" />
  <link rel="manifest" href="/manifest.json" />

  <script>
    /* Anti-FOUC bootstrap — must run before <body> renders.
       Sets both data-theme and lang from localStorage so returning users
       don't get a flash of wrong theme or language. */
    (function () {
      var root = document.documentElement;
      var VALID = ["light", "dark", "night", "rainbow", "school",
                   "black-orange", "neon-green", "neon-violet",
                   "pastel", "ocean", "sunset",
                   "cyberpunk", "coffee", "terminal", "aurora",
                   "soviet-lift", "soviet-podyezd"];
      try {
        var s = localStorage.getItem("bananafont:theme");
        if (s && VALID.indexOf(s) !== -1) {
          root.dataset.theme = s;
        } else {
          var p = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
          root.dataset.theme = p ? "light" : "dark";
        }
      } catch (e) {
        root.dataset.theme = "dark";
      }
      try {
        var l = localStorage.getItem("bananafont:lang");
        if (l === "ru" || l === "en") {
          root.lang = l;
        } else {
          var b = (navigator.language || "").toLowerCase();
          if (b.indexOf("ru") === 0) root.lang = "ru";
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Montserrat&family=Open+Sans&family=PT+Sans&family=Roboto&family=Roboto+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <main class="app">
    <div class="top-bar">
      <div class="theme-switch" role="group" aria-label="Theme">
        <button type="button" data-theme-btn="light" aria-label="Light theme"></button>
        <button type="button" data-theme-btn="dark" aria-label="Dark theme"></button>
        <button type="button" data-theme-btn="night" aria-label="Night theme"></button>
        <button type="button" data-theme-btn="black-orange" aria-label="Black-Orange theme"></button>
        <!-- v5.21.0: Iridescent (formerly "Rainbow") moved to LAST position
             per user request — and must stay last as new themes are added.
             data-theme-btn keeps "rainbow" for backward compat (localStorage,
             CSS selectors, animation keyframes). The LABEL is renamed. -->
        <button type="button" data-theme-btn="rainbow" aria-label="Iridescent theme"></button>
        <!-- Other extra themes (neon-green, neon-violet, pastel, ocean, sunset,
             cyberpunk, coffee, terminal, aurora, soviet-lift, soviet-podyezd)
             live in Settings → Additional themes.
             School stays unlocked only via secret code LIBERATEDSCHOOL. -->
      </div>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="en">EN</button>
      </div>
    </div>

    <nav class="tabs" role="tablist">
      <button type="button" class="tab-btn active" data-tab="home" role="tab" aria-selected="true" id="tab-btn-home"></button>
      <button type="button" class="tab-btn" data-tab="fonts" role="tab" aria-selected="false" id="tab-btn-fonts"></button>
      <button type="button" class="tab-btn" data-tab="calc" role="tab" aria-selected="false" id="tab-btn-calc"></button>
      <button type="button" class="tab-btn" data-tab="time" role="tab" aria-selected="false" id="tab-btn-time"></button>
      <button type="button" class="tab-btn" data-tab="tools" role="tab" aria-selected="false" id="tab-btn-tools"></button>
      <button type="button" class="tab-btn" data-tab="settings" role="tab" aria-selected="false" id="tab-btn-settings"></button>
      <!-- Secret tab is always kept LAST. Do not reorder. -->
      <button type="button" class="tab-btn" data-tab="secret" role="tab" aria-selected="false" id="tab-btn-secret"></button>
    </nav>

    <section id="tab-home" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-home">
      <h1 id="home-title"></h1>
      <p class="home-intro" id="home-intro"></p>

      <div class="tool-section">
        <h3 id="tool-text-label"></h3>
        <textarea id="home-input" class="home-input" placeholder=""></textarea>
        <div class="text-stats">
          <span><strong id="stat-chars">0</strong> <span id="stat-chars-label"></span></span>
          <span><strong id="stat-words">0</strong> <span id="stat-words-label"></span></span>
          <span><strong id="stat-lines">0</strong> <span id="stat-lines-label"></span></span>
          <span><strong id="stat-no-spaces">0</strong> <span id="stat-no-spaces-label"></span></span>
        </div>
      </div>

      <div class="tool-section">
        <h3 id="tool-case-label"></h3>
        <div class="tool-actions">
          <button type="button" data-transform="upper" class="tool-btn">ABCD</button>
          <button type="button" data-transform="lower" class="tool-btn">abcd</button>
          <button type="button" data-transform="title" class="tool-btn">Abcd</button>
          <button type="button" data-transform="invert" class="tool-btn">aBcD</button>
        </div>
      </div>

      <div class="tool-section">
        <h3 id="tool-lines-label"></h3>
        <div class="tool-actions">
          <button type="button" data-action="sort-asc" id="btn-sort-asc" class="tool-btn"></button>
          <button type="button" data-action="sort-desc" id="btn-sort-desc" class="tool-btn"></button>
          <button type="button" data-action="dedupe" id="btn-dedupe" class="tool-btn"></button>
          <button type="button" data-action="remove-empty" id="btn-remove-empty" class="tool-btn"></button>
        </div>
      </div>

      <div class="tool-section">
        <h3 id="tool-clean-label"></h3>
        <div class="tool-actions">
          <button type="button" data-action="trim-spaces" id="btn-trim" class="tool-btn"></button>
          <button type="button" data-action="reverse" id="btn-reverse" class="tool-btn"></button>
          <button type="button" data-action="copy" id="btn-home-copy" class="tool-btn"></button>
          <button type="button" data-action="clear" id="btn-clear" class="tool-btn"></button>
        </div>
      </div>
    </section>

    <section id="tab-fonts" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-fonts" hidden>
      <h1 id="title"></h1>
      <textarea id="input"></textarea>
      <div class="fonts" id="fonts"></div>
      <div id="output" class="output"></div>
      <button type="button" id="copy-btn" class="copy-btn" disabled></button>
    </section>

    <section id="tab-calc" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-calc" hidden>
      <h1 id="calc-title"></h1>

      <div class="calc-modes" role="tablist">
        <button type="button" class="calc-mode-btn active" data-mode="basic"></button>
        <button type="button" class="calc-mode-btn" data-mode="geom"></button>
        <button type="button" class="calc-mode-btn" data-mode="units"></button>
        <button type="button" class="calc-mode-btn" data-mode="fraction"></button>
      </div>

      <div id="calc-panel-basic" class="calc-panel">
        <div class="calc-display" id="calc-display">0</div>
        <div class="calc-keypad">
          <button type="button" class="calc-btn calc-btn-action" data-key="AC">AC</button>
          <button type="button" class="calc-btn calc-btn-action" data-key="neg">±</button>
          <button type="button" class="calc-btn calc-btn-action" data-key="%">%</button>
          <button type="button" class="calc-btn calc-btn-op" data-key="/">÷</button>
          <button type="button" class="calc-btn" data-key="7">7</button>
          <button type="button" class="calc-btn" data-key="8">8</button>
          <button type="button" class="calc-btn" data-key="9">9</button>
          <button type="button" class="calc-btn calc-btn-op" data-key="*">×</button>
          <button type="button" class="calc-btn" data-key="4">4</button>
          <button type="button" class="calc-btn" data-key="5">5</button>
          <button type="button" class="calc-btn" data-key="6">6</button>
          <button type="button" class="calc-btn calc-btn-op" data-key="-">−</button>
          <button type="button" class="calc-btn" data-key="1">1</button>
          <button type="button" class="calc-btn" data-key="2">2</button>
          <button type="button" class="calc-btn" data-key="3">3</button>
          <button type="button" class="calc-btn calc-btn-op" data-key="+">+</button>
          <button type="button" class="calc-btn calc-btn-zero" data-key="0">0</button>
          <button type="button" class="calc-btn" data-key=".">.</button>
          <button type="button" class="calc-btn calc-btn-eq" data-key="=">=</button>
        </div>
      </div>

      <div id="calc-panel-geom" class="calc-panel" hidden>
        <div class="calc-row">
          <label for="geom-shape" id="geom-shape-label"></label>
          <select id="geom-shape" class="calc-select"></select>
        </div>
        <div id="geom-inputs" class="calc-inputs"></div>
        <div id="geom-results" class="calc-results"></div>
      </div>

      <div id="calc-panel-units" class="calc-panel" hidden>
        <div class="calc-row">
          <label for="units-cat" id="units-cat-label"></label>
          <select id="units-cat" class="calc-select"></select>
        </div>
        <div class="units-conversion">
          <div class="units-row">
            <input type="number" id="units-from-val" class="calc-input" value="1" step="any" inputmode="decimal" />
            <select id="units-from" class="calc-select"></select>
          </div>
          <div class="units-arrow">⇅</div>
          <div class="units-row">
            <input type="number" id="units-to-val" class="calc-input" readonly />
            <select id="units-to" class="calc-select"></select>
          </div>
        </div>
      </div>

      <!-- Fraction calculator: a/b op c/d → result (reduced). -->
      <div id="calc-panel-fraction" class="calc-panel" hidden>
        <p class="calc-frac-intro" id="frac-intro"></p>
        <div class="frac-row">
          <div class="frac-stack">
            <input type="number" id="frac-a-num" class="calc-input frac-input" value="1" step="1" inputmode="numeric" aria-label="numerator A" />
            <div class="frac-bar"></div>
            <input type="number" id="frac-a-den" class="calc-input frac-input" value="2" step="1" inputmode="numeric" aria-label="denominator A" />
          </div>
          <div class="frac-op-group" role="group">
            <button type="button" class="frac-op-btn active" data-frac-op="+">+</button>
            <button type="button" class="frac-op-btn" data-frac-op="-">−</button>
            <button type="button" class="frac-op-btn" data-frac-op="*">×</button>
            <button type="button" class="frac-op-btn" data-frac-op="/">÷</button>
          </div>
          <div class="frac-stack">
            <input type="number" id="frac-b-num" class="calc-input frac-input" value="1" step="1" inputmode="numeric" aria-label="numerator B" />
            <div class="frac-bar"></div>
            <input type="number" id="frac-b-den" class="calc-input frac-input" value="3" step="1" inputmode="numeric" aria-label="denominator B" />
          </div>
          <div class="frac-equals">=</div>
          <div class="frac-result" id="frac-result">—</div>
        </div>
      </div>
    </section>

    <!-- Time tab: 3 live clocks + stopwatch + timer. -->
    <section id="tab-time" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-time" hidden>
      <h1 id="time-title"></h1>

      <div class="time-section">
        <h3 id="clocks-label"></h3>
        <div class="clocks-grid">
          <div class="clock-card">
            <div class="clock-name" id="clock-name-moscow"></div>
            <div class="clock-time" id="clock-moscow">—</div>
            <div class="clock-date" id="clock-date-moscow"></div>
          </div>
          <div class="clock-card">
            <div class="clock-name" id="clock-name-yerevan"></div>
            <div class="clock-time" id="clock-yerevan">—</div>
            <div class="clock-date" id="clock-date-yerevan"></div>
          </div>
          <div class="clock-card">
            <div class="clock-name" id="clock-name-newyork"></div>
            <div class="clock-time" id="clock-newyork">—</div>
            <div class="clock-date" id="clock-date-newyork"></div>
          </div>
        </div>
      </div>

      <div class="time-section">
        <h3 id="stopwatch-label"></h3>
        <div class="stopwatch-display" id="stopwatch-display">00:00.00</div>
        <div class="time-controls">
          <button type="button" id="stopwatch-start" class="tool-btn"></button>
          <button type="button" id="stopwatch-reset" class="tool-btn"></button>
          <button type="button" id="stopwatch-lap" class="tool-btn"></button>
        </div>
        <ol id="stopwatch-laps" class="stopwatch-laps"></ol>
      </div>

      <div class="time-section">
        <h3 id="timer-label"></h3>
        <div class="timer-inputs">
          <input type="number" id="timer-min" class="calc-input timer-input" value="5" min="0" max="999" step="1" inputmode="numeric" aria-label="minutes" />
          <span class="timer-colon">:</span>
          <input type="number" id="timer-sec" class="calc-input timer-input" value="0" min="0" max="59" step="1" inputmode="numeric" aria-label="seconds" />
          <!-- Milliseconds field — visible only when timerShowMs is on -->
          <span class="timer-dot" id="timer-ms-wrap" hidden>.</span>
          <input type="number" id="timer-ms" class="calc-input timer-input timer-ms-field" value="0" min="0" max="999" step="1" inputmode="numeric" aria-label="milliseconds" hidden />
        </div>
        <div class="timer-display" id="timer-display">05:00</div>
        <div class="time-controls">
          <button type="button" id="timer-start" class="tool-btn"></button>
          <button type="button" id="timer-reset" class="tool-btn"></button>
        </div>
        <!-- Quick add/subtract-time buttons (v5.15.0 / v5.18.0):
             work whether idle / running / paused / done -->
        <div class="time-controls timer-add-row">
          <button type="button" class="tool-btn timer-add-btn" data-add-sec="30">+30s</button>
          <button type="button" class="tool-btn timer-add-btn" data-add-sec="60">+1m</button>
          <button type="button" class="tool-btn timer-add-btn" data-add-sec="300">+5m</button>
        </div>
        <div class="time-controls timer-add-row">
          <button type="button" class="tool-btn timer-add-btn timer-sub-btn" data-add-sec="-30">−30s</button>
          <button type="button" class="tool-btn timer-add-btn timer-sub-btn" data-add-sec="-60">−1m</button>
          <button type="button" class="tool-btn timer-add-btn timer-sub-btn" data-add-sec="-300">−5m</button>
        </div>
        <!-- Millisecond precision toggle (v5.15.0 / v5.25.0 switch UI) -->
        <label class="timer-ms-toggle">
          <span class="toggle-switch"><input type="checkbox" id="timer-ms-toggle" /><span class="toggle-slider"></span></span>
          <span id="timer-ms-label"></span>
        </label>
        <div class="timer-feedback" id="timer-feedback"></div>
      </div>

      <!-- Alarm clock: user must pick a timezone FIRST, only then can they
           set an alarm time. Time picker stays disabled until TZ chosen. -->
      <div class="time-section alarm-section">
        <h3 id="alarm-label"></h3>
        <p class="alarm-hint" id="alarm-hint"></p>

        <!-- Step 1: timezone picker -->
        <div class="alarm-step">
          <div class="alarm-step-num">1</div>
          <div class="alarm-step-body">
            <label for="alarm-tz" id="alarm-tz-label"></label>
            <select id="alarm-tz" class="calc-select">
              <option value="" id="alarm-tz-placeholder"></option>
            </select>
            <div class="alarm-tz-time" id="alarm-tz-time">—</div>
          </div>
        </div>

        <!-- Step 2: alarm time (disabled until TZ picked) -->
        <div class="alarm-step" id="alarm-step-time">
          <div class="alarm-step-num">2</div>
          <div class="alarm-step-body">
            <label id="alarm-time-label"></label>
            <div class="alarm-inputs">
              <input type="number" id="alarm-hour" class="calc-input timer-input" value="7" min="0" max="23" step="1" inputmode="numeric" aria-label="hour" disabled />
              <span class="timer-colon">:</span>
              <input type="number" id="alarm-min" class="calc-input timer-input" value="0" min="0" max="59" step="1" inputmode="numeric" aria-label="minute" disabled />
            </div>
            <div class="time-controls">
              <button type="button" id="alarm-set" class="tool-btn" disabled></button>
              <button type="button" id="alarm-cancel" class="tool-btn" disabled></button>
            </div>
          </div>
        </div>

        <div class="alarm-status" id="alarm-status"></div>
      </div>
    </section>

    <!-- Tools tab (v5.25.0: restored from Settings — utilities that don't
         affect site state belong in their own tab). -->
    <section id="tab-tools" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-tools" hidden>
      <h1 id="tools-title"></h1>

      <!-- Password generator -->
      <div class="tool-section">
        <h3 id="passgen-label"></h3>
        <div class="passgen-row">
          <label class="passgen-len-label">
            <span id="passgen-len-text"></span>
            <input type="range" id="passgen-len" class="settings-slider" min="4" max="64" value="16" />
            <span id="passgen-len-value">16</span>
          </label>
        </div>
        <div class="passgen-checks">
          <label class="passgen-check">
            <span class="toggle-switch"><input type="checkbox" id="passgen-lower" checked /><span class="toggle-slider"></span></span>
            <span id="passgen-lower-text"></span>
          </label>
          <label class="passgen-check">
            <span class="toggle-switch"><input type="checkbox" id="passgen-upper" checked /><span class="toggle-slider"></span></span>
            <span id="passgen-upper-text"></span>
          </label>
          <label class="passgen-check">
            <span class="toggle-switch"><input type="checkbox" id="passgen-digit" checked /><span class="toggle-slider"></span></span>
            <span id="passgen-digit-text"></span>
          </label>
          <label class="passgen-check">
            <span class="toggle-switch"><input type="checkbox" id="passgen-symbol" /><span class="toggle-slider"></span></span>
            <span id="passgen-symbol-text"></span>
          </label>
        </div>
        <div class="passgen-output-row">
          <input type="text" id="passgen-output" class="calc-input passgen-output" readonly />
          <button type="button" id="passgen-generate" class="tool-btn silent-btn"></button>
          <button type="button" id="passgen-copy" class="tool-btn silent-btn"></button>
        </div>
      </div>

      <!-- Random number -->
      <div class="tool-section">
        <h3 id="randnum-label"></h3>
        <div class="randnum-row">
          <label><span id="randnum-min-text"></span><input type="number" id="randnum-min" class="calc-input" value="1" /></label>
          <label><span id="randnum-max-text"></span><input type="number" id="randnum-max" class="calc-input" value="100" /></label>
        </div>
        <div class="randnum-controls">
          <button type="button" id="randnum-generate" class="tool-btn silent-btn"></button>
          <div class="randnum-result" id="randnum-result">—</div>
        </div>
      </div>

      <!-- Lorem ipsum: paragraphs limit raised to 50 (v5.25.0) -->
      <div class="tool-section">
        <h3 id="lorem-label"></h3>
        <div class="lorem-controls">
          <label>
            <span id="lorem-count-text"></span>
            <input type="number" id="lorem-count" class="calc-input" value="3" min="1" max="50" />
            <span class="lorem-limit-hint" id="lorem-limit-hint"></span>
          </label>
          <div class="lorem-lang-toggle">
            <button type="button" class="tool-btn lorem-lang-btn active" data-lorem-lang="lat">Lorem</button>
            <button type="button" class="tool-btn lorem-lang-btn" data-lorem-lang="rus">Рыба</button>
          </div>
          <button type="button" id="lorem-generate" class="tool-btn silent-btn"></button>
          <button type="button" id="lorem-copy" class="tool-btn silent-btn"></button>
        </div>
        <textarea id="lorem-output" class="home-input lorem-output" readonly></textarea>
      </div>

      <!-- Color picker / converter -->
      <div class="tool-section">
        <h3 id="color-label"></h3>
        <div class="color-row">
          <input type="color" id="color-picker" class="color-picker" value="#6a5cff" />
          <input type="text" id="color-hex" class="calc-input color-hex" value="#6a5cff" />
        </div>
        <div class="color-formats">
          <div class="color-format"><span class="color-format-label">HEX</span><span class="color-format-value" id="color-hex-display">#6a5cff</span></div>
          <div class="color-format"><span class="color-format-label">RGB</span><span class="color-format-value" id="color-rgb">rgb(106, 92, 255)</span></div>
          <div class="color-format"><span class="color-format-label">HSL</span><span class="color-format-value" id="color-hsl">hsl(245, 100%, 68%)</span></div>
        </div>
      </div>
    </section>

    <section id="tab-settings" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-settings" hidden>
      <h1 id="settings-title"></h1>

      <!-- v5.19.0: Extra themes — neon green/violet, pastel, ocean, sunset.
           Populated dynamically by JS from the EXTRA_THEMES list. -->
      <div class="settings-section">
        <h3 id="settings-extra-themes-label"></h3>
        <p class="settings-hint" id="settings-extra-themes-hint"></p>
        <div class="extra-themes-grid" id="extra-themes-grid"></div>
      </div>

      <div class="settings-section">
        <h3 id="settings-size-label"></h3>
        <input type="range" id="preview-size" class="settings-slider" min="16" max="72" value="30" />
        <div class="settings-row">
          <span id="settings-size-value">30px</span>
          <span class="settings-hint" id="settings-size-hint"></span>
        </div>
        <div id="settings-size-sample" class="settings-size-sample">Hello 123 · Привет</div>
      </div>

      <!-- v5.22.0 / v5.24.0: Sound toggle + volume slider — controls UI
           feedback sounds + timer/alarm chime. Volume = 0 effectively
           mutes; the toggle is a hard on/off independent of volume. -->
      <div class="settings-section">
        <h3 id="settings-sound-label"></h3>
        <p class="settings-hint" id="settings-sound-hint"></p>
        <button type="button" id="sound-toggle-btn" class="settings-btn"></button>
        <div class="sound-volume-row">
          <label for="sound-volume" id="sound-volume-label"></label>
          <input type="range" id="sound-volume" class="settings-slider" min="0" max="100" value="80" />
          <span id="sound-volume-value">80%</span>
        </div>
      </div>

      <div class="settings-section settings-danger-zone">
        <h3 id="settings-reset-label"></h3>
        <!-- v5.20.0: visible warning explaining what will be lost. -->
        <div class="settings-warning-box" id="settings-reset-warning"></div>
        <button type="button" id="reset-btn" class="settings-btn settings-btn-danger"></button>
        <div class="settings-hint" id="settings-reset-hint"></div>
      </div>

      <div class="settings-section">
        <h3 id="settings-about-label"></h3>
        <p class="settings-about" id="settings-about-text"></p>
        <p class="settings-about">
          <a href="https://github.com/1565gfd/bananafonts" target="_blank" rel="noopener noreferrer" id="settings-github-link">GitHub</a>
          ·
          <span id="settings-version-line">VERSION</span>
        </p>
      </div>
    </section>

    <!-- Secret tab section — always last in DOM order to match tab button order. -->
    <section id="tab-secret" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-secret" hidden>
      <h1 id="secret-title"></h1>
      <p class="home-intro" id="secret-intro"></p>

      <div class="tool-section">
        <h3 id="secret-label"></h3>
        <div class="secret-row">
          <input type="text" id="secret-input" class="calc-input" placeholder="" autocomplete="off" spellcheck="false" />
          <button type="button" id="secret-submit" class="tool-btn silent-btn"></button>
        </div>
        <div id="secret-feedback" class="secret-feedback"></div>
      </div>

      <div id="secret-result" class="secret-result"></div>
    </section>

    <footer id="footer"></footer>

    <!-- NOTE: The school-theme logo SVG used to live here, but the user
         asked to remove it after several failed attempts to reproduce
         the source image faithfully ("лого убери так уж и быть" — v5.7.2).
         As of v5.9.0 the navy/gold background + gold accent are the only
         visual indicator that the school theme is active. Do NOT re-add
         a logo here unless the user explicitly requests it. -->

    <!--
      Off-screen invisible hint: lands in the clipboard when user
      selects-all (Ctrl+A) and copies (Ctrl+C). Visually invisible
      (opacity 0, far off the viewport), but a selectable text node
      that stays in flow — so it ends up in the paste buffer.
      aria-hidden so screen readers don't read it aloud.
    -->
    <span class="hidden-hint" aria-hidden="true">[ secret code hint: ILOVELIBSCHOOL ]</span>
  </main>

  <script src="/js/app.js" defer></script>
  <!-- Vercel Speed Insights (Real User Monitoring).
       Served by Vercel CDN as a same-origin script when Speed Insights is
       enabled in Vercel Dashboard → Project → Speed Insights → Enable.
       Locally (file://, python http.server) returns 404 — that's expected. -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
