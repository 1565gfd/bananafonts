<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#161b3a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2ff" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="light dark" />
  <title>Banana — помощник</title>
  <meta name="copyright" content="© banana.team" />
  <meta name="robots" content="noindex" />

  <!-- ============================================================
       AUTO-TELEPORT TO HOME
       If a user lands on a non-existent URL (typo, dead link, etc.),
       teleport them home instantly instead of showing the 404 card.
       Meta refresh is the no-JS fallback; the inline script fires
       on JS-enabled browsers before paint.
       The visible 404 card below is the last-resort fallback if both
       meta refresh and JS are blocked.
       ============================================================ -->
  <meta http-equiv="refresh" content="0; url=/" />
  <script>
    /* Use replace() so the bad URL doesn't pollute browser back-button history */
    try { window.location.replace("/"); } catch (e) { window.location.href = "/"; }
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='64' y2='64' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23222949'/><stop offset='1' stop-color='%231c1f3a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><text x='32' y='32' font-family='Arial, sans-serif' font-size='38' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>B</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='180' y2='180' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23222949'/><stop offset='1' stop-color='%231c1f3a'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><text x='90' y='90' font-family='Arial, sans-serif' font-size='108' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>B</text></svg>" />
  <link rel="manifest" href="/manifest.json" />

  <script>
    /* Anti-FOUC bootstrap — sets both data-theme and lang from localStorage. */
    (function () {
      var root = document.documentElement;
      var VALID = ["light", "dark", "night", "rainbow", "school",
                   "black-orange", "neon-green", "neon-violet",
                   "pastel", "ocean", "sunset"];
      try {
        var s = localStorage.getItem("bananafont:theme");
        if (s && VALID.indexOf(s) !== -1) {
          root.dataset.theme = s;
        } else {
          var p = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
          root.dataset.theme = p ? "light" : "dark";
        }
      } catch (e) {
        root.dataset.theme = "dark";
      }
      try {
        var l = localStorage.getItem("bananafont:lang");
        if (l === "ru" || l === "en") {
          root.lang = l;
        } else {
          var b = (navigator.language || "").toLowerCase();
          if (b.indexOf("ru") === 0) root.lang = "ru";
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="not-found-wrap">
  <main class="not-found-card">
    <h1 class="not-found-title">Page not found · Страница не найдена</h1>
    <div class="not-found-code">404</div>
    <p class="not-found-text">The page you requested doesn&apos;t exist or has been moved.</p>
    <p class="not-found-text">Запрошенная страница не существует или была перемещена.</p>
    <p class="not-found-text">
      <a class="not-found-link" href="/">← Back to home · Вернуться на главную</a>
    </p>
  </main>
  <!-- Vercel Speed Insights (also on 404 to track broken-link sources). -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
