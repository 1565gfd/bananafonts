<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Banana Font</title>
  <meta name="copyright" content="© banana.team" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='64' y2='64' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23222949'/><stop offset='1' stop-color='%231c1f3a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><text x='32' y='32' font-family='Arial, sans-serif' font-size='38' font-weight='700' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>B</text></svg>" />

  <script>
    (function () {
      try {
        var s = localStorage.getItem("bananafont:theme");
        if (s === "light" || s === "dark" || s === "night") {
          document.documentElement.dataset.theme = s;
          return;
        }
        var p = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.dataset.theme = p ? "light" : "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>

  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="not-found-wrap">
  <main class="not-found-card">
    <h1 class="not-found-title">Page not found · Страница не найдена</h1>
    <div class="not-found-code">404</div>
    <p class="not-found-text">The page you requested doesn&apos;t exist or has been moved.</p>
    <p class="not-found-text">Запрошенная страница не существует или была перемещена.</p>
    <p class="not-found-text">
      <a class="not-found-link" href="/">← Back to home · Вернуться на главную</a>
    </p>
  </main>
</body>
</html>
